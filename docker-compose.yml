services:
  postgres:
    image: postgres:16-bookworm
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - .:/app
      - app-node-modules:/app/node_modules
      - next-cache:/app/.next
    command: ["./scripts/docker-dev-start.sh"]

volumes:
  postgres-data:
  app-node-modules:
  next-cache:
